name: FileDrop Build

on:
  push:
    branches: [main]
    paths:
      - "FileDrop/**"
      - ".github/workflows/filedrop-ios.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AppIcon assets
        working-directory: FileDrop
        run: |
          ICON_DIR="FileDrop/Assets.xcassets/AppIcon.appiconset"
          test -f "$ICON_DIR/Icon-1024.png" || { echo "Missing app icons"; exit 1; }
          echo "App icons present."

      - name: Select Xcode
        id: xcode
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "profile=modern" >> "$GITHUB_OUTPUT"
          elif [ -d /Applications/Xcode_16.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
            echo "profile=modern" >> "$GITHUB_OUTPUT"
          elif [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
            echo "profile=modern" >> "$GITHUB_OUTPUT"
          elif [ -d /Applications/Xcode_16.app ]; then
            echo "WARNING: Xcode 16.2+ not found; using Xcode_16.app with actool workarounds."
            echo "Available Xcode installations:"
            ls /Applications/ | grep Xcode || true
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
            echo "profile=legacy" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: No Xcode 16.2+ found. Available:"
            ls /Applications/ | grep Xcode || true
            exit 1
          fi
          xcodebuild -version

      - name: Install iOS 18 Simulator Runtime
        if: steps.xcode.outputs.profile == 'legacy'
        run: |
          xcodebuild -downloadPlatform iOS -buildVersion 22A3362 || true
          xcrun simctl list runtimes

      - name: Build unsigned app
        working-directory: FileDrop
        run: |
          set -e
          XCODEBUILD_ARGS=(
            -project FileDrop.xcodeproj
            -scheme FileDrop
            -configuration Release
            -sdk iphoneos
            -destination "generic/platform=iOS"
            -derivedDataPath build/DerivedData
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            EXPANDED_CODE_SIGN_IDENTITY=""
            ONLY_ACTIVE_ARCH=NO
            SKIP_INSTALL=NO
            ENABLE_PREVIEWS=NO
            COMPILER_INDEX_STORE_ENABLE=NO
            build
          )

          if [ "${{ steps.xcode.outputs.profile }}" = "legacy" ]; then
            set -o pipefail
            xcodebuild "${XCODEBUILD_ARGS[@]}" 2>&1 | tee build.log
            RESULT=${PIPESTATUS[0]}
            if grep -q "BUILD SUCCEEDED" build.log; then
              exit 0
            fi
            exit "$RESULT"
          else
            xcodebuild "${XCODEBUILD_ARGS[@]}"
          fi

      - name: Verify .app exists
        working-directory: FileDrop
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/FileDrop.app"
          test -d "$APP_PATH" || { echo "ERROR: FileDrop.app not found at $APP_PATH"; exit 1; }
          echo "FileDrop.app found. Size: $(du -sh $APP_PATH | cut -f1)"

      - name: Package IPA
        working-directory: FileDrop
        run: |
          mkdir -p build/Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/FileDrop.app build/Payload/
          cd build && zip -r FileDrop.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileDrop-ipa
          path: FileDrop/build/FileDrop.ipa
          retention-days: 7

      - name: Build complete
        run: echo "✅ FileDrop.ipa ready — download from Actions artifacts"
